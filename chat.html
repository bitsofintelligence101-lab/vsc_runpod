<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunPod Chat</title>
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --text: #e2e8f0; --muted: #94a3b8; --brand: #0ea5e9;
      --user-bg: #0c4a6e; --bot-bg: #1e293b;
      --input-bg: #1e293b; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Segoe UI, system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; display: flex; flex-direction: column;
    }

    /* ── Config panel ── */
    #config-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; gap: 10px; align-items: flex-end;
      flex-wrap: wrap;
    }
    #config-bar label { font-size: 11px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
    #config-bar input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 6px 9px; font-size: 13px; width: 100%;
    }
    #config-bar .field-api  { flex: 0 0 220px; }
    #config-bar .field-ep   { flex: 0 0 200px; }
    #config-bar .field-model { flex: 0 0 280px; }
    #config-bar .field-temp { flex: 0 0 80px; }
    #config-bar .field-tok  { flex: 0 0 80px; }
    #save-btn {
      background: var(--brand); color: #fff; border: 0;
      border-radius: 6px; padding: 7px 14px; font-weight: 600;
      cursor: pointer; font-size: 13px; align-self: flex-end;
    }
    #save-btn:hover { filter: brightness(1.15); }
    #status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #475569; align-self: flex-end; margin-bottom: 10px; flex-shrink: 0;
    }
    #status-dot.ok { background: #22c55e; }
    #status-dot.err { background: var(--danger); }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .msg { display: flex; gap: 10px; max-width: 820px; }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; max-width: 72%; }
    .msg.bot   { align-self: flex-start; }
    .bubble {
      padding: 10px 14px; border-radius: 12px; font-size: 14px;
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user  .bubble { background: var(--user-bg); border-bottom-right-radius: 3px; }
    .msg.bot   .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .msg.error .bubble { border-color: var(--danger); color: var(--danger); }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      font-size: 15px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .msg.user .avatar { background: var(--brand); }
    .msg.bot  .avatar { background: #334155; }
    .msg img.thumb { max-width: 220px; border-radius: 8px; display: block; margin-top: 6px; }
    .typing { color: var(--muted); font-style: italic; }

    /* ── Input bar ── */
    #input-bar {
      border-top: 1px solid var(--border); background: var(--surface);
      padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end;
    }
    #input-bar textarea {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px; padding: 10px 13px;
      font-size: 14px; font-family: inherit; resize: none;
      line-height: 1.5; max-height: 180px; overflow-y: auto;
    }
    #input-bar textarea:focus { outline: none; border-color: var(--brand); }
    #image-btn, #send-btn, #clear-btn {
      border: 0; border-radius: 8px; padding: 9px 14px;
      cursor: pointer; font-size: 13px; font-weight: 600;
    }
    #image-btn { background: #334155; color: var(--text); }
    #image-btn:hover { background: #475569; }
    #send-btn { background: var(--brand); color: #fff; }
    #send-btn:hover { filter: brightness(1.15); }
    #send-btn:disabled { opacity: .5; cursor: not-allowed; }
    #clear-btn { background: #1e293b; color: var(--muted); border: 1px solid var(--border); }
    #clear-btn:hover { color: var(--danger); border-color: var(--danger); }
    #image-preview {
      position: absolute; bottom: 80px; left: 16px;
      display: none; align-items: center; gap: 8px;
    }
    #image-preview img { height: 56px; border-radius: 6px; border: 1px solid var(--border); }
    #image-preview button {
      background: var(--danger); color: #fff; border: 0;
      border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px;
    }
    #bottom-wrap { position: relative; }
  </style>
</head>
<body>

<!-- ── Config ── -->
<div id="config-bar">
  <label class="field-api">API Key
    <input id="api-key" type="password" placeholder="rpa_..." autocomplete="off" />
  </label>
  <label class="field-ep">Endpoint ID
    <input id="endpoint-id" placeholder="4zymmya1e6kh25" />
  </label>
  <label class="field-model">Model name
    <input id="model-name" placeholder="Qwen3.6-27B-uncensored-heretic-v2" />
  </label>
  <label class="field-temp">Temp
    <input id="temperature" type="number" min="0" max="2" step="0.05" value="0.7" />
  </label>
  <label class="field-tok">Max tokens
    <input id="max-tokens" type="number" min="1" max="8192" value="2048" />
  </label>
  <button id="save-btn">Save</button>
  <div id="status-dot" title="Not connected"></div>
</div>

<!-- ── Chat ── -->
<div id="messages"></div>

<!-- ── Input ── -->
<div id="bottom-wrap">
  <div id="image-preview">
    <img id="preview-img" src="" alt="attached" />
    <button onclick="clearImage()" title="Remove image">✕</button>
  </div>
  <div id="input-bar">
    <input type="file" id="file-input" accept="image/*" style="display:none" />
    <button id="image-btn" title="Attach image" onclick="document.getElementById('file-input').click()">🖼</button>
    <textarea id="prompt" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="clear-btn" onclick="clearChat()" title="Clear conversation">🗑</button>
    <button id="send-btn" onclick="sendMessage()">Send ↑</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let history = [];          // [{role, content}] — full conversation
let pendingImageB64 = null; // base64 data-URL of the attached image
let abortCtrl = null;

const STORAGE_KEY = "runpod_chat_cfg";

// ── Config persistence ─────────────────────────────────────────────────────
function loadConfig() {
  try {
    const c = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    if (c.apiKey)       document.getElementById("api-key").value       = c.apiKey;
    if (c.endpointId)   document.getElementById("endpoint-id").value   = c.endpointId;
    if (c.modelName)    document.getElementById("model-name").value     = c.modelName;
    if (c.temperature != null) document.getElementById("temperature").value  = c.temperature;
    if (c.maxTokens != null)   document.getElementById("max-tokens").value   = c.maxTokens;
  } catch(e) {}
}

function saveConfig() {
  const cfg = {
    apiKey:      document.getElementById("api-key").value.trim(),
    endpointId:  document.getElementById("endpoint-id").value.trim(),
    modelName:   document.getElementById("model-name").value.trim(),
    temperature: parseFloat(document.getElementById("temperature").value),
    maxTokens:   parseInt(document.getElementById("max-tokens").value, 10),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  updateDot(null); // just flash
}

function getCfg() {
  const apiKey     = document.getElementById("api-key").value.trim();
  const endpointId = document.getElementById("endpoint-id").value.trim();
  const modelName  = document.getElementById("model-name").value.trim() || "Qwen3.6-27B-uncensored-heretic-v2";
  const temperature = parseFloat(document.getElementById("temperature").value) || 0.7;
  const maxTokens  = parseInt(document.getElementById("max-tokens").value, 10) || 2048;
  const baseUrl    = `https://api.runpod.ai/v2/${endpointId}/openai/v1`;
  return { apiKey, endpointId, modelName, temperature, maxTokens, baseUrl };
}

function updateDot(ok) {
  const dot = document.getElementById("status-dot");
  dot.className = ok === true ? "ok" : ok === false ? "err" : "";
  dot.title = ok === true ? "Connected" : ok === false ? "Error" : "Not connected";
}

document.getElementById("save-btn").addEventListener("click", () => {
  saveConfig();
  appendMsg("bot", "Config saved.");
});

// ── Image attachment ───────────────────────────────────────────────────────
document.getElementById("file-input").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageB64 = ev.target.result; // full data URL
    const prev = document.getElementById("preview-img");
    prev.src = pendingImageB64;
    document.getElementById("image-preview").style.display = "flex";
  };
  reader.readAsDataURL(file);
  e.target.value = ""; // reset so same file can be re-attached
});

function clearImage() {
  pendingImageB64 = null;
  document.getElementById("image-preview").style.display = "none";
}

// ── Chat DOM helpers ───────────────────────────────────────────────────────
function appendMsg(role, text, imgSrc) {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "👤" : role === "error" ? "⚠" : "🤖";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  if (imgSrc) {
    const img = document.createElement("img");
    img.className = "thumb";
    img.src = imgSrc;
    bubble.appendChild(img);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function appendTyping() {
  return appendMsg("bot", "…");
}

function clearChat() {
  history = [];
  document.getElementById("messages").innerHTML = "";
  clearImage();
}

// ── Send ───────────────────────────────────────────────────────────────────
async function sendMessage() {
  const cfg = getCfg();
  const textarea = document.getElementById("prompt");
  const text = textarea.value.trim();
  if (!text && !pendingImageB64) return;
  if (!cfg.apiKey || !cfg.endpointId) {
    appendMsg("error", "Set your API Key and Endpoint ID in the config bar above, then click Save.");
    return;
  }

  // Build user content
  let userContent;
  const userImgSrc = pendingImageB64;
  if (pendingImageB64) {
    userContent = [
      { type: "text", text: text || "(image)" },
      { type: "image_url", image_url: { url: pendingImageB64 } }
    ];
  } else {
    userContent = text;
  }

  // Show user message in UI
  appendMsg("user", text || "(image)", userImgSrc);
  clearImage();
  textarea.value = "";
  textarea.style.height = "auto";

  // Add to history
  history.push({ role: "user", content: userContent });

  // Typing indicator
  const typingBubble = appendTyping();
  typingBubble.classList.add("typing");

  document.getElementById("send-btn").disabled = true;
  abortCtrl = new AbortController();

  try {
    const resp = await fetch(`${cfg.baseUrl}/chat/completions`, {
      method: "POST",
      signal: abortCtrl.signal,
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${cfg.apiKey}`,
      },
      body: JSON.stringify({
        model: cfg.modelName,
        messages: history,
        temperature: cfg.temperature,
        max_tokens: cfg.maxTokens,
        stream: true,
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }

    updateDot(true);

    // Stream response
    typingBubble.textContent = "";
    typingBubble.classList.remove("typing");

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let assistantText = "";
    let buf = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      // Process complete SSE lines
      const lines = buf.split("\n");
      buf = lines.pop(); // keep partial last line

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed === "data: [DONE]") continue;
        if (!trimmed.startsWith("data:")) continue;
        try {
          const json = JSON.parse(trimmed.slice(5).trim());
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            assistantText += delta;
            typingBubble.textContent = assistantText;
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
          }
        } catch(e) { /* ignore malformed SSE chunks */ }
      }
    }

    // Finalize
    history.push({ role: "assistant", content: assistantText });

  } catch (e) {
    typingBubble.textContent = "";
    if (e.name !== "AbortError") {
      typingBubble.closest(".msg").className = "msg error";
      typingBubble.textContent = `Error: ${e.message}`;
      updateDot(false);
    }
  } finally {
    document.getElementById("send-btn").disabled = false;
    abortCtrl = null;
  }
}

// ── Textarea auto-grow + Enter to send ────────────────────────────────────
const ta = document.getElementById("prompt");
ta.addEventListener("input", () => {
  ta.style.height = "auto";
  ta.style.height = Math.min(ta.scrollHeight, 180) + "px";
});
ta.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Init ───────────────────────────────────────────────────────────────────
loadConfig();
</script>
</body>
</html>
